name: Deploy

on:
  push:
    branches:
      - main

jobs:
  trigger-gitlab:
    name: Trigger GitLab Deployment pipeline
    runs-on: ubuntu-latest

    steps:
      - name: Trigger GitLab Deployment pipeline
        run: |
          curl -X POST \
            --fail-with-body \
            -F token=${{ secrets.GITLAB_TRIGGER_TOKEN }} \
            -F ref=main \
            "${{ secrets.GITLAB_TRIGGER_URL }}"
